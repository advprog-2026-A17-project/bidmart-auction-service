<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidMart - Auction Interface</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 750px;
        }
        h1 {
            color: #1a202c;
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        li {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: box-shadow 0.2s;
        }
        li:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .item-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }
        .status-ACTIVE { background-color: #48bb78; }
        .status-EXTENDED { background-color: #ed8936; }
        .status-CLOSED { background-color: #e53e3e; }

        .interaction-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .price {
            font-weight: 700;
            color: #2b6cb0;
            font-size: 1.2rem;
            min-width: 100px;
            text-align: right;
        }
        .bid-input {
            width: 90px;
            padding: 8px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
        }
        .bid-button {
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .bid-button:hover { background-color: #2b6cb0; }
        .bid-button:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }
        .toast-error {
            color: #c53030;
            background-color: #fed7d7;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
